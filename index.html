<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #313338;
      font-family: "gg sans", "Noto Sans KR", sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: #2b2d31;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 320px;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
      line-height: 1.25;
    }

    p {
      font-size: 14px;
      color: #b5bac1;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #5865f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #4752c4;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(180,190,255,0.45) 30%, rgba(0,0,0,0) 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    .flash.active {
      animation: flashEffect 0.45s ease;
    }

    @keyframes flashEffect {
      0% { opacity: 0; }
      18% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="container" id="fake">
    <h1>브라우저에서 Discord<br>열기</h1>
    <p>보안을 위해 링크를 확인하세요</p>
    <button id="enterBtn">확인하기</button>
  </div>

  <div class="stage" id="stage">
    <img id="gif" src="kyoka.gif" alt="Kyoka Suigetsu GIF">
  </div>

  <div class="flash" id="flash"></div>

  <audio id="audio" src="kyoka.mp3" preload="auto"></audio>

  <script>
    const btn = document.getElementById('enterBtn');
    const stage = document.getElementById('stage');
    const fake = document.getElementById('fake');
    const audio = document.getElementById('audio');
    const gif = document.getElementById('gif');
    const flash = document.getElementById('flash');

    let soundInterval = null;

    function restartGif() {
      const src = gif.src;
      gif.src = '';
      void gif.offsetHeight;
      gif.src = src;
    }

    function triggerFlash() {
      flash.classList.remove('active');
      void flash.offsetWidth;
      flash.classList.add('active');
    }

    async function playOnce() {
      triggerFlash();
      restartGif();
      audio.pause();
      audio.currentTime = 0;
      await audio.play();
    }

    btn.addEventListener('click', async () => {
      fake.style.display = 'none';
      stage.style.display = 'flex';

      if (soundInterval) clearInterval(soundInterval);

      try {
        await playOnce();
      } catch (error) {
        console.error('오디오 재생 실패:', error);
      }

      soundInterval = setInterval(() => {
        playOnce().catch((error) => {
          console.error('반복 재생 실패:', error);
        });
      }, 4200);
    });
  </script>
</body>
</html>
