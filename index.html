<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #313338;
      font-family: "gg sans", "Noto Sans KR", sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      background: #2b2d31;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    p {
      font-size: 14px;
      color: #b5bac1;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #5865f2;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #4752c4;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: black;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

    <button id="enterBtn">확인하기</button>
  </div>

<script><script>
  const btn = document.getElementById('enterBtn');
  const stage = document.getElementById('stage');
  const fake = document.getElementById('fake');
  const audio = document.getElementById('audio');
  const gif = document.getElementById('gif');

  let soundInterval = null;

  function restartGif() {
    const src = gif.src;
    gif.src = '';
    gif.offsetHeight;
    gif.src = src;
  }

  btn.addEventListener('click', async () => {
    fake.style.display = 'none';
    stage.style.display = 'flex';

    restartGif();

    audio.loop = false;
    audio.pause();
    audio.currentTime = 0;

    if (soundInterval) clearInterval(soundInterval);

    try {
      await audio.play(); // 첫 클릭 즉시 재생
    } catch (e) {
      console.error('첫 재생 실패', e);
    }

    soundInterval = setInterval(() => {
      audio.pause();
      audio.currentTime = 0;
      audio.play();
      restartGif();
    }, 4200);
  });
</script>

</body>
</html>
